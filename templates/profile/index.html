{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title">个人中心</h2>
                <hr>
                <div class="row">
                    <div class="col-md-6">
                        <div class="card text-center mb-3">
                            <div class="card-body">
                                <h3 class="card-title">{{ posts_count }}</h3>
                                <p class="card-text">发表的言论</p>
                                <a href="{{ url_for('profile.posts') }}" class="btn btn-primary">查看</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card text-center mb-3">
                            <div class="card-body">
                                <h3 class="card-title">{{ favorites_count }}</h3>
                                <p class="card-text">收藏的言论</p>
                                <a href="{{ url_for('profile.favorites') }}" class="btn btn-warning">查看</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
